<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    
    <title>Khaled & Omnia's Wedding</title>
    <!-- خطوط إنجليزية وعربية (Amiri, Aref Ruqaa, Great Vibes, Cormorant Garamond) -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== */
        /*      CSS STYLES      */
        /* ==================== */
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #f8f4f0; 
            color: #5a3e3d; 
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            transition: font-family 0.3s ease;
        }

        /* 20% Opacity Fixed SVG Background for Main Page */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Group 3.svg');
            background-attachment: fixed;
            background-repeat: repeat;
            background-position: center;
            opacity: 0.2; 
            z-index: -2; 
            pointer-events: none;
        }

        /* --- Language Button --- */
        .lang-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(168, 107, 110, 0.4);
            color: #a86b6e;
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .lang-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }

        /* --- Mobile Responsive Fixes --- */
        @media (max-width: 600px) {
            .lang-btn {
                top: 10px;
                right: 10px;
                padding: 4px 10px;
                font-size: 0.85rem;
            }
            
            #main-content {
                padding: 65px 15px 40px 15px !important; 
            }

            .names {
                font-size: 4rem !important; 
            }
            body[dir="rtl"] .names {
                font-size: 3.8rem !important;
            }
        }

        /* --- Typography & Language Mode Overrides --- */
        body[dir="rtl"] {
            font-family: 'Amiri', serif;
        }
        body[dir="rtl"] .names, 
        body[dir="rtl"] .date-box h3, 
        body[dir="rtl"] .location-box h2,
        body[dir="rtl"] .time-up {
            font-family: 'Aref Ruqaa', serif;
        }
        body[dir="rtl"] .names { font-size: 4.5rem; }
        body[dir="rtl"] .date-box h3, body[dir="rtl"] .location-box h2 { font-size: 2.5rem; }

        body[dir="ltr"] .names {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
        }
        body[dir="ltr"] .date-box h3, body[dir="ltr"] .location-box h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
        }

        /* --- 1. Envelope Intro Screen --- */
        #intro-screen {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh;
            background-color: transparent; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease-in-out;
            perspective: 1000px; 
        }

        .env-inside {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: #e2cec8; 
            z-index: 1;
        }
        .env-left {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: #f1dfd9;
            clip-path: polygon(0 0, 50% 55%, 0 100%);
            z-index: 2;
        }
        .env-right {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: #f1dfd9;
            clip-path: polygon(100% 0, 50% 55%, 100% 100%);
            z-index: 2;
        }
        .env-bottom {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: #f7e6e1;
            clip-path: polygon(0 100%, 0 70%, 50% 53%, 100% 70%, 100% 100%);
            z-index: 3;
            filter: drop-shadow(0 -4px 8px rgba(0,0,0,0.06)); 
        }
        .env-flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: #ebd4ce;
            clip-path: polygon(0 0, 100% 0, 50% 56%);
            z-index: 4;
            transform-origin: top center;
            transition: transform 1.2s ease-in-out;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        
        .env-left::after, .env-right::after, .env-bottom::after, .env-flap::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Group 3.svg');
            background-repeat: repeat;
            background-position: center;
            opacity: 0.10; 
            pointer-events: none;
        }
        
        .env-flap.open { transform: rotateX(180deg); }
        
        .seal-btn {
            position: absolute;
            top: 56%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: auto;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 2.5s infinite;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.2));
            -webkit-user-drag: none;
        }
        
        .seal-btn:hover { animation-play-state: paused; }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .seal-btn.opening {
            transform: translate(-50%, -50%) scale(0) !important;
            opacity: 0;
            transition: transform 0.6s ease-in-out, opacity 0.5s ease-in-out;
            animation: none; 
        }
        
        .tap-text {
            position: absolute;
            top: 68%;
            width: 100%;
            font-style: italic;
            font-size: 1.4rem;
            text-align: center;
            color: #8a6460;
            letter-spacing: 1px;
            z-index: 5;
            transition: opacity 0.4s;
        }

        .slide-out-down {
            transform: translateY(100vh);
            opacity: 0;
            pointer-events: none;
        }

        /* --- 2. Main Content & Smooth Reveal --- */
        #main-content {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 50px 20px;
            transition: opacity 1.2s ease-in-out, visibility 1.2s ease-in-out;
        }

        #main-content.reveal {
            opacity: 1;
            visibility: visible;
            position: relative;
        }

        .animate-item {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .animate-item.show-pop {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .main-intro-text {
            font-size: calc(1.4rem + 4px); 
            font-weight: 700; 
            margin-bottom: 10px;
            font-style: italic;
            color: #5a3e3d;
            line-height: 1.4;
        }

        .names {
            color: #a86b6e;
            margin: 5px 0;
            line-height: 1.1;
            font-weight: 400;
        }

        .ampersand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: #7d846e;
            font-style: italic;
            margin: 2px 0;
        }

        .arrow-down {
            font-size: 1.5rem;
            color: #a86b6e;
            margin: 15px 0;
            opacity: 0.7;
        }

        .card-box {
            border: 1.5px solid rgba(168, 107, 110, 0.3);
            padding: 25px;
            border-radius: 16px;
            margin: 15px auto;
            background-color: rgba(255, 255, 255, 0.85); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            backdrop-filter: blur(5px);
        }
        
        .date-box p {
            font-size: 1.3rem;
            margin-bottom: 5px;
            font-style: italic;
        }

        /* --- 3. Location Details --- */
        .location-box p {
            font-size: 1.2rem;
            color: #4a3332;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .location-icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: #7d846e;
        }

        /* --- 4. Countdown Timer --- */
        .countdown-timer {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
            direction: ltr; 
        }
        
        .time-box {
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(168, 107, 110, 0.3);
            color: #a86b6e;
            padding: 10px 8px;
            border-radius: 10px;
            min-width: 65px;
            text-align: center;
        }
        
        .time-box span {
            display: block;
            font-size: 1.7rem;
            font-family: sans-serif;
            font-weight: 300;
        }
        
        .time-box small {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-family: inherit;
            color: #7d846e;
        }
    </style>
</head>
<body dir="ltr" translate="no">

    <!-- Language Toggle Button -->
    <button id="lang-toggle" class="lang-btn">عربي</button>

    <!-- ==================== -->
    <!--     INTRO ENVELOPE   -->
    <!-- ==================== -->
    <div id="intro-screen">
        <div class="env-inside"></div>
        <div class="env-left"></div>
        <div class="env-right"></div>
        <div class="env-bottom"></div>
        <div class="env-flap" id="env-flap"></div>

        <img src="image 2.png" alt="Wedding Seal" class="seal-btn" id="seal-btn">
        <p class="tap-text" id="tap-text" data-en="↑<br>Tap the seal" data-ar="↑<br>اضغط على الختم">↑<br>Tap the seal</p>
    </div>

    <!-- ==================== -->
    <!--     MAIN CONTENT     -->
    <!-- ==================== -->
    <div id="main-content">
        
        <div class="animate-item">
            <p class="main-intro-text" data-en="Please join us to celebrate<br>the wedding of" data-ar="يسعدنا دعوتكم لحضور حفل زفاف">Please join us to celebrate<br>the wedding of</p>
        </div>
        
        <div class="animate-item card-box">
            <h1 class="names notranslate" translate="no" data-en="Khaled" data-ar="خالد">Khaled</h1>
            <div class="ampersand notranslate" translate="no" data-en="&" data-ar="و">&</div>
            <h1 class="names notranslate" translate="no" data-en="Omnia" data-ar="أمنية">Omnia</h1>
        </div>
        
        <div class="animate-item arrow-down">↓</div>

        <div class="animate-item card-box date-box">
            <p data-en="On" data-ar="في">On</p>
            <h3 data-en="31 July 2026" data-ar="31 يوليو 2026">31 July 2026</h3>
        </div>

        <div class="animate-item card-box location-box">
            <div class="location-icon">📍</div>
            <h2 data-en="Location Details" data-ar="تفاصيل الموقع">Location Details</h2>
            <p data-en="<strong>Almasa Base, Fath Club</strong><br>Mostafa Kamel, Behind the Northern Military Zone" data-ar="<strong>قاعدة الماسة، نادي الفتح</strong><br>مصطفى كامل، خلف المنطقة الشمالية العسكرية"><strong>Almasa Base, Fath Club</strong><br>Mostafa Kamel, Behind the Northern Military Zone</p>
            <p data-en="Alexandria, Egypt" data-ar="الإسكندرية، مصر">Alexandria, Egypt</p>
            <p style="font-style: italic; margin-top: 8px; color: #7d846e;" data-en="7:30 PM" data-ar="7:30 مساءً">7:30 PM</p>
        </div>

        <div class="animate-item card-box" style="margin-bottom: 60px;">
            <p class="main-intro-text" style="font-size: 1.2rem; margin-bottom: 5px; font-weight: 400;" data-en="Time remaining " data-ar="الوقت المتبقي ">Time remaining until we say "I do"</p>
            <div class="countdown-timer" id="timer">
                <div class="time-box"><span id="days">00</span><small data-en="Days" data-ar="أيام">Days</small></div>
                <div class="time-box"><span id="hours">00</span><small data-en="Hours" data-ar="ساعات">Hours</small></div>
                <div class="time-box"><span id="minutes">00</span><small data-en="Mins" data-ar="دقائق">Mins</small></div>
                <div class="time-box"><span id="seconds">00</span><small data-en="Secs" data-ar="ثواني">Secs</small></div>
            </div>
        </div>
        
    </div>

    <!-- ==================== -->
    <!--      JAVASCRIPT      -->
    <!-- ==================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Language Toggle Logic ---
            const langToggle = document.getElementById('lang-toggle');
            let currentLang = 'en';

            langToggle.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                langToggle.innerText = currentLang === 'en' ? 'عربي' : 'English';
                document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

                document.querySelectorAll('[data-en]').forEach(el => {
                    el.innerHTML = el.getAttribute(`data-${currentLang}`);
                });
            });

            // --- Intro Envelope Animation Logic ---
            const sealBtn = document.getElementById('seal-btn');
            const introScreen = document.getElementById('intro-screen');
            const envFlap = document.getElementById('env-flap');
            const mainContent = document.getElementById('main-content');
            const tapText = document.getElementById('tap-text');
            const animateItems = document.querySelectorAll('.animate-item');

            sealBtn.addEventListener('click', () => {
                sealBtn.classList.add('opening');
                tapText.style.opacity = '0';
                
                setTimeout(() => {
                    envFlap.classList.add('open');
                }, 400); 
                
                setTimeout(() => {
                    introScreen.classList.add('slide-out-down');
                }, 1200); 
                
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    mainContent.classList.add('reveal');
                    
                    const observerOptions = {
                        root: null,
                        rootMargin: '0px',
                        threshold: 0.15 
                    };

                    const scrollObserver = new IntersectionObserver((entries, observer) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('show-pop');
                                scrollObserver.unobserve(entry.target); 
                            }
                        });
                    }, observerOptions);

                    animateItems.forEach(item => {
                        scrollObserver.observe(item);
                    });
                    
                }, 1800);
            });

            // --- Countdown Timer Logic ---
            const weddingDate = new Date("July 31, 2026 19:30:00").getTime();

            const updateTimer = setInterval(() => {
                const now = new Date().getTime();
                const distance = weddingDate - now;

                if (distance < 0) {
                    clearInterval(updateTimer);
                    const timeUpText = currentLang === 'en' ? "It's time!" : "حان الوقت!";
                    document.getElementById('timer').innerHTML = `<h3 class='time-up notranslate' translate="no" style='font-size: 2.5rem; color: #a86b6e;' data-en="It's time!" data-ar="حان الوقت!">${timeUpText}</h3>`;
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days < 10 ? '0' + days : days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;

            }, 1000);
        });
    </script>
</body>
</html>
